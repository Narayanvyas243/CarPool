version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: carpool-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: vyaspapa
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    container_name: carpool-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: vyaspapa
      ME_CONFIG_MONGODB_URL: mongodb://admin:vyaspapa@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    depends_on:
      - mongo

volumes:
  mongo_data:
